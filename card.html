<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Leaforest · 전자명함</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:#111;color:#e8dfc8;min-height:100vh}
    .loading{display:flex;align-items:center;justify-content:center;height:100vh;color:#6e665a;font-size:14px}
    .card{max-width:400px;margin:0 auto;padding-bottom:3rem}
    .header{padding:2.5rem 1.5rem 1.5rem;text-align:center;position:relative;overflow:hidden}
    .header-bg{position:absolute;top:0;left:0;right:0;height:140px;opacity:0.3}
    .avatar{width:80px;height:80px;border-radius:50%;margin:0 auto 1rem;border:2px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:2rem;color:#fff;position:relative;overflow:hidden;background:rgba(255,255,255,0.1)}
    .avatar img{width:100%;height:100%;object-fit:cover}
    .name{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:400;color:#fff;margin-bottom:4px;position:relative}
    .job{font-size:12px;color:rgba(255,255,255,0.5);letter-spacing:0.06em;position:relative;margin-top:2px}
   .company{font-size:15px;color:rgba(255,255,255,0.75);margin-top:4px;position:relative;font-weight:500;letter-spacing:0.03em}
    .bio{margin:0 1.25rem 1.25rem;padding:14px;background:rgba(255,255,255,0.05);border-radius:12px;font-size:13px;color:rgba(255,255,255,0.55);line-height:1.7}
    .links{padding:0 1.25rem;display:flex;flex-direction:column;gap:8px}
    .link{display:flex;align-items:center;gap:12px;padding:12px 14px;background:rgba(255,255,255,0.06);border-radius:12px;cursor:pointer;border:none;width:100%;text-align:left}
    .icon{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
    .link-text{flex:1}
    .link-label{font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:0.08em;text-transform:uppercase}
    .link-val{font-size:13px;color:rgba(255,255,255,0.8);margin-top:2px;word-break:break-all}
    .arrow{font-size:14px;color:rgba(255,255,255,0.2);flex-shrink:0}
    .address-box{margin:0 1.25rem 8px;padding:12px 14px;background:rgba(255,255,255,0.06);border-radius:12px}
    .address-label{font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:4px}
    .address-val{font-size:13px;color:rgba(255,255,255,0.8);line-height:1.5}
    .actions{padding:1.25rem 1.25rem 0;display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .act-primary{padding:12px;border-radius:12px;border:none;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;color:#fff}
    .act-secondary{padding:12px;border-radius:12px;border:none;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.6)}
    .branding{text-align:center;margin-top:2rem;font-size:10px;color:rgba(255,255,255,0.15);letter-spacing:0.12em}
    .not-found{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;color:#6e665a;font-size:14px;gap:8px}
    .not-found span{font-family:'Cormorant Garamond',serif;font-size:1.2rem;color:#c8b478}
    .section-gap{height:8px}
  </style>
</head>
<body>
  <div class="loading" id="loading">불러오는 중...</div>
  <div class="card" id="card" style="display:none"></div>
  <div class="not-found" id="notfound" style="display:none">
    <span>Leaforest</span>명함을 찾을 수 없어요
  </div>

  <script>
    const SUPABASE_URL = 'https://vmofuiiobcgigzpjvsxz.supabase.co'
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZtb2Z1aWlvYmNnaWd6cGp2c3h6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NDU0MjUsImV4cCI6MjA5MTEyMTQyNX0.y8XVU1P0B2-C36YGJiBmaCaNJIwlIMhSd9tG5RgUx2A'
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

    function initials(name){
      if(!name) return '?'
      const p=name.trim().split(/\s+/)
      return p.length===1?p[0][0].toUpperCase():(p[0][0]+p[p.length-1][0]).toUpperCase()
    }
    function openWebsite(url){
      if(!url) return
      if(url.startsWith('http')) window.open(url)
      else window.open('https://'+url)
    }

    async function load(){
      const params=new URLSearchParams(location.search)
      const id=params.get('id')
      if(!id){show('notfound');return}
      const {data,error}=await sb.from('cards').select('*').eq('user_id',id).single()
      if(error||!data){show('notfound');return}

      const acc=data.accent||'#2d6a4f'

      const titles=[data.title,data.title2,data.title3,data.title4].filter(Boolean)
      const depts=[data.dept,data.dept2,data.dept3,data.dept4].filter(Boolean)

      const card=document.getElementById('card')
      card.innerHTML=`
        <div class="header">
          <div class="header-bg" style="background:linear-gradient(180deg,${acc} 0%,transparent 100%)"></div>
          <div class="avatar" style="background:linear-gradient(135deg,${acc}cc,${acc}44)">
            ${data.avatar_url?`<img src="${data.avatar_url}" alt=""/>`:`<span>${initials(data.name)}</span>`}
          </div>
          <div class="name">${data.name||''}</div>
          ${data.company?`<div class="company">${data.company}</div>`:''}
          ${titles.map(t=>`<div class="job">${t}</div>`).join('')}
          ${depts.map(d=>`<div class="job">${d}</div>`).join('')}
        </div>
        ${data.bio?`<div class="bio">${data.bio}</div>`:''}
        ${data.address?`<div class="address-box"><div class="address-label">주소</div><div class="address-val">${data.address}</div></div>`:''}
        <div class="links">
          ${data.phone?`<button class="link" onclick="window.location='tel:${data.phone}'">
            <div class="icon" style="background:${acc}33">📱</div>
            <div class="link-text"><div class="link-label">Mobile M.</div><div class="link-val">${data.phone}</div></div>
            <div class="arrow">›</div></button>`:''}
          ${data.phone_company?`<button class="link" onclick="window.location='tel:${data.phone_company}'">
            <div class="icon" style="background:${acc}33">📞</div>
            <div class="link-text"><div class="link-label">Tel T.</div><div class="link-val">${data.phone_company}</div></div>
            <div class="arrow">›</div></button>`:''}
          ${data.phone_fax?`<button class="link" onclick="window.location='tel:${data.phone_fax}'">
            <div class="icon" style="background:${acc}33">🖨️</div>
            <div class="link-text"><div class="link-label">Fax F.</div><div class="link-val">${data.phone_fax}</div></div>
            <div class="arrow">›</div></button>`:''}
          ${data.email?`<button class="link" onclick="window.location='mailto:${data.email}'">
            <div class="icon" style="background:${acc}33">✉️</div>
            <div class="link-text"><div class="link-label">이메일</div><div class="link-val">${data.email}</div></div>
            <div class="arrow">›</div></button>`:''}
          ${data.website?`<button class="link" onclick="openWebsite('${data.website}')">
            <div class="icon" style="background:${acc}33">🌐</div>
            <div class="link-text"><div class="link-label">웹사이트</div><div class="link-val">${data.website}</div></div>
            <div class="arrow">›</div></button>`:''}
          ${data.instagram?`<button class="link" onclick="openWebsite('https://instagram.com/${data.instagram.replace('@','')}')">
            <div class="icon" style="background:${acc}33">📸</div>
            <div class="link-text"><div class="link-label">인스타그램</div><div class="link-val">${data.instagram}</div></div>
            <div class="arrow">›</div></button>`:''}
          ${data.linkedin?`<button class="link" onclick="openWebsite('${data.linkedin.startsWith('http')?data.linkedin:'https://'+data.linkedin}')">
            <div class="icon" style="background:${acc}33">💼</div>
            <div class="link-text"><div class="link-label">LinkedIn</div><div class="link-val">${data.linkedin}</div></div>
            <div class="arrow">›</div></button>`:''}
        </div>
        <div class="actions">
          <button class="act-primary" style="background:${acc}" onclick="saveContact()">연락처 저장</button>
          <button class="act-secondary" onclick="shareCard()">공유하기</button>
        </div>
        <div class="branding">Leaforest · 전자명함</div>
      `
      window._cardData=data
      show('card')
    }

    function saveContact(){
      const d=window._cardData
      const vcard=`BEGIN:VCARD\nVERSION:3.0\nFN:${d.name||''}\nTITLE:${[d.title,d.title2,d.title3,d.title4].filter(Boolean).join(' / ')}\nORG:${d.company||''}\nTEL;TYPE=CELL:${d.phone||''}\nTEL;TYPE=WORK:${d.phone_company||''}\nTEL;TYPE=FAX:${d.phone_fax||''}\nEMAIL:${d.email||''}\nURL:${d.website||''}\nADR:;;${d.address||''};;;;\nEND:VCARD`
      const blob=new Blob([vcard],{type:'text/vcard'})
      const a=document.createElement('a')
      a.href=URL.createObjectURL(blob)
      a.download=(d.name||'contact')+'.vcf'
      a.click()
    }

    function shareCard(){
      if(navigator.share) navigator.share({title:window._cardData.name,url:location.href})
      else{navigator.clipboard.writeText(location.href);alert('링크가 복사되었어요!')}
    }

    function show(id){
      document.getElementById('loading').style.display='none'
      document.getElementById(id).style.display='block'
    }

    load()
  </script>
</body>
</html>
